syntax = "proto3";

package skymouse;

option go_package = "github.com/Tomahawk-Center/SkyMouse/proto;protoapi";

option java_multiple_files = true;
option java_package = "com.skymouse.skymouseclient.proto";

enum MouseButton {
    BUTTON_UNKNOWN = 0;
    BUTTON_LEFT = 1;
    BUTTON_RIGHT = 2;
    BUTTON_MIDDLE = 3;
}

enum ButtonState {
    STATE_UNKNOWN = 0;
    STATE_DOWN = 1;
    STATE_UP = 2;
}

message MouseEvent {
    float delta_x = 1;
    float delta_y = 2;
    int64 timestamp_ms = 3;
    uint32 sequence_id = 4;
}

message ClickEvent {
    MouseButton button = 1;
    ButtonState state = 2;
    int64 timestamp_ms = 3;
}

message ScrollEvent {
    int32 delta_y = 1;
    int64 timestamp_ms = 2;
}

message Ping {}

message Pong {}

message ClientHello {
    string client_version = 1;
}

message ServerHello {
    string server_version = 1;
    int32 udp_port = 2;
}

message MessageToServer {
    oneof event {
        MouseEvent mouse = 1;
        ClickEvent click = 2;
        ScrollEvent scroll = 3;
        ClientHello client_hello = 4;
        Ping ping = 5;
        Pong pong = 6;
    }
}

message MessageToClient {
    oneof event {
        ServerHello server_hello = 1;
    }
}